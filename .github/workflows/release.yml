name: Build & Release

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (e.g. 1.2.3). Leave empty for auto-bump patch."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      skipped: ${{ steps.check.outputs.skipped }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if tag push
        id: check
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
          else
            echo "skipped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Auto-bump version
        id: bump
        if: steps.check.outputs.skipped != 'true'
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            LATEST=$(git tag --sort=-v:refname | head -n1 | sed 's/^v//')
            if [ -z "$LATEST" ]; then
              LATEST="0.0.0"
            fi
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
            PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "### Bumped to v${VERSION}" >> "$GITHUB_STEP_SUMMARY"

      - name: Update Version.h
        if: steps.check.outputs.skipped != 'true'
        run: |
          sed -i "s/#define PLUGIN_VERSION.*\".*\"/#define PLUGIN_VERSION \"${{ steps.bump.outputs.version }}\"/" \
            "IDA Pro SigMaker/Version.h"

      - name: Commit and tag
        if: steps.check.outputs.skipped != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "IDA Pro SigMaker/Version.h"
          git diff --cached --quiet || {
            git commit -m "chore: bump version to ${{ steps.bump.outputs.version }}"
            git tag "${{ steps.bump.outputs.tag }}"
            git push origin HEAD "${{ steps.bump.outputs.tag }}"
          }

  build-windows:
    needs: bump-version
    if: needs.bump-version.outputs.skipped != 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build 64-bit plugin
        shell: pwsh
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DIDA_SDK_PATH="${{ github.workspace }}\SDK" `
            -DIDA_EA64=ON
          cmake --build build --config Release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: build/Release/SigMaker64.dll
          if-no-files-found: error

  build-linux:
    needs: bump-version
    if: needs.bump-version.outputs.skipped != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ xclip

      - name: Build 64-bit plugin
        run: |
          cmake -B build \
            -DIDA_SDK_PATH="${{ github.workspace }}/SDK" \
            -DIDA_EA64=ON \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: build/SigMaker64.so
          if-no-files-found: error

  release:
    needs: [bump-version, build-windows, build-linux]
    if: needs.bump-version.outputs.skipped != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump-version.outputs.tag }}
          name: "SigMaker ${{ needs.bump-version.outputs.tag }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/windows-x64/SigMaker64.dll
            artifacts/linux-x64/SigMaker64.so
